services:
  app:
    build: .
    ports:
      - "4715:4715"
    environment:
      DATABASE_URL: postgres://cycles:cycles@db:5432/cycles?sslmode=disable
      CYCLE_PASSWORD: ${CYCLE_PASSWORD:-changeme}
      COOKIE_SECURE: "false"
      PORT: "4715"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cycles
      POSTGRES_PASSWORD: cycles
      POSTGRES_DB: cycles
    volumes:
      - cycles_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cycles"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cycles_pgdata:
