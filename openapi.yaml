openapi: 3.0.3
info:
  title: Varde API
  description: >
    Single-user planning API for process people. The core object is a
    project cycle, not a todo list. All state transitions are enforced
    server-side. See SPEC.md in the repository for the full product spec.
  version: "1.1.0"
servers:
  - url: /
security:
  - sessionCookie: []
tags:
  - name: auth
  - name: status
  - name: cycles
  - name: reviews
  - name: questions
  - name: ideas
  - name: export
  - name: health

paths:
  /auth/login:
    post:
      tags: [auth]
      summary: Log in with the single-user password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        "200":
          description: Logged in. Sets a long-lived session cookie.
          headers:
            Set-Cookie:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Error"

  /auth/logout:
    post:
      tags: [auth]
      summary: Log out and clear the session
      responses:
        "200":
          description: Logged out

  /status:
    get:
      tags: [status]
      summary: Everyday check-in status
      responses:
        "200":
          description: Current status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /cycles:
    post:
      tags: [cycles]
      summary: Create a cycle (rejected if an active cycle already exists)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CycleCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cycle"
        "409":
          description: An active cycle already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    get:
      tags: [cycles]
      summary: List cycles
      parameters:
        - name: state
          in: query
          schema:
            $ref: "#/components/schemas/CycleState"
      responses:
        "200":
          description: List of cycles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cycle"

  /cycles/{id}:
    get:
      tags: [cycles]
      summary: Get a cycle
      parameters:
        - $ref: "#/components/parameters/CycleId"
      responses:
        "200":
          description: The cycle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cycle"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [cycles]
      summary: Edit fields and/or transition state
      description: >-
        Transitions follow the state machine but are never time-gated:
        `buried` is reachable at any moment from any non-terminal state
        (requires brain_dump), and forward steps may happen at any pace —
        a same-day walk building → understanding → showing → completed is
        normal usage. `completed` requires artifact_url and brain_dump.
      parameters:
        - $ref: "#/components/parameters/CycleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CyclePatch"
      responses:
        "200":
          description: Updated cycle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cycle"
        "422":
          description: Invalid state transition or missing artifact/brain_dump
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /cycles/{id}/entries:
    post:
      tags: [cycles]
      summary: Add an update to a cycle's timeline
      description: >
        Creates a kind=update entry only. System entries (cycle created,
        state transitions, estimate changes, completion/burial) and review
        entries are generated server-side and can never be written directly.
      parameters:
        - $ref: "#/components/parameters/CycleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimelineEntry"
        "404":
          $ref: "#/components/responses/Error"
    get:
      tags: [cycles]
      summary: The cycle's full timeline (all kinds), newest first
      description: >
        Review entries come back with their WeeklyReview hydrated under
        `review`, so the UI can render the richer inline card without
        extra requests.
      parameters:
        - $ref: "#/components/parameters/CycleId"
      responses:
        "200":
          description: List of timeline entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineEntry"

  /cycles/{id}/entries/{entryId}:
    delete:
      tags: [cycles]
      summary: Delete a timeline update (kind=update only)
      parameters:
        - $ref: "#/components/parameters/CycleId"
        - name: entryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
        "404":
          $ref: "#/components/responses/Error"
        "422":
          description: Entry is a system or review entry and cannot be deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /reviews/weekly:
    post:
      tags: [reviews]
      summary: Submit a completed weekly review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeeklyReviewCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyReview"
    get:
      tags: [reviews]
      summary: List weekly reviews, newest first
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of weekly reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyReview"

  /reviews/quarterly:
    post:
      tags: [reviews]
      summary: Submit a completed quarterly review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuarterlyReviewCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuarterlyReview"
    get:
      tags: [reviews]
      summary: List quarterly reviews, newest first
      responses:
        "200":
          description: List of quarterly reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuarterlyReview"

  /questions:
    get:
      tags: [questions]
      summary: List parked questions
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/QuestionStatus"
      responses:
        "200":
          description: List of parked questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParkedQuestion"
    post:
      tags: [questions]
      summary: Park a new big-life question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkedQuestion"

  /questions/{id}:
    patch:
      tags: [questions]
      summary: Change status and/or append a note (quarterly review flow)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/QuestionStatus"
                append_note:
                  type: string
      responses:
        "200":
          description: Updated question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkedQuestion"

  /ideas:
    post:
      tags: [ideas]
      summary: Capture an idea into the backlog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                note:
                  type: string
                  description: One or two sentences max — no long specs.
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"
    get:
      tags: [ideas]
      summary: List ideas, newest first
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/IdeaStatus"
      responses:
        "200":
          description: List of ideas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Idea"

  /ideas/{id}:
    patch:
      tags: [ideas]
      summary: Edit title/note, or set status (open ⇄ discarded)
      parameters:
        - $ref: "#/components/parameters/IdeaId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                note: { type: string }
                status:
                  type: string
                  enum: [open, discarded]
      responses:
        "200":
          description: Updated idea
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"
        "404":
          $ref: "#/components/responses/Error"

  /ideas/{id}/promote:
    post:
      tags: [ideas]
      summary: Promote an open idea into the next cycle
      description: >
        Creates a new Cycle prefilled with the idea's title and
        note-as-intent (the body may override), marks the idea promoted
        and links promoted_cycle_id. Rejected while an active cycle exists.
      parameters:
        - $ref: "#/components/parameters/IdeaId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                intent: { type: string }
                target_weeks: { type: integer, minimum: 1, maximum: 16 }
                show_plan: { type: string }
      responses:
        "201":
          description: Idea promoted, cycle created
          content:
            application/json:
              schema:
                type: object
                properties:
                  idea: { $ref: "#/components/schemas/Idea" }
                  cycle: { $ref: "#/components/schemas/Cycle" }
        "409":
          description: An active cycle already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "422":
          description: Idea is not open
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /export:
    get:
      tags: [export]
      summary: Full JSON dump of all data
      responses:
        "200":
          description: Full export
          content:
            application/json:
              schema:
                type: object

  /health:
    get:
      tags: [health]
      summary: Health check (DB connectivity) for Railway
      security: []
      responses:
        "200":
          description: Healthy
        "503":
          description: DB unavailable

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: cycle_session

  parameters:
    CycleId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdeaId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Error:
      description: Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"

  schemas:
    ErrorBody:
      type: object
      properties:
        error:
          type: string
        detail:
          type: string

    CycleState:
      type: string
      enum: [building, understanding, showing, completed, buried]

    QuestionStatus:
      type: string
      enum: [parked, answered, dropped]

    IdeaStatus:
      type: string
      enum: [open, promoted, discarded]

    Idea:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        note: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        status: { $ref: "#/components/schemas/IdeaStatus" }
        promoted_cycle_id: { type: string, format: uuid, nullable: true }

    Cycle:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        intent: { type: string }
        state: { $ref: "#/components/schemas/CycleState" }
        started_at: { type: string, format: date }
        target_weeks: { type: integer }
        show_plan: { type: string }
        artifact_url: { type: string, nullable: true }
        brain_dump: { type: string, nullable: true }
        ended_at: { type: string, format: date, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CycleCreate:
      type: object
      required: [title]
      properties:
        title: { type: string }
        intent: { type: string }
        target_weeks:
          type: integer
          minimum: 1
          maximum: 16
          default: 1
          description: A living estimate, not a commitment — editable anytime while active.
        show_plan: { type: string }

    TimelineEntryKind:
      type: string
      enum: [update, system, review]

    TimelineEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        cycle_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        kind: { $ref: "#/components/schemas/TimelineEntryKind" }
        text:
          type: string
          description: User prose for update entries; generated text for system entries.
        ref_id:
          type: string
          format: uuid
          nullable: true
          description: For review entries, the id of the linked WeeklyReview.
        review:
          allOf:
            - $ref: "#/components/schemas/WeeklyReview"
          nullable: true
          description: Hydrated on reads for kind=review entries.

    CyclePatch:
      type: object
      properties:
        title: { type: string }
        intent: { type: string }
        target_weeks: { type: integer }
        show_plan: { type: string }
        artifact_url: { type: string }
        brain_dump: { type: string }
        state: { $ref: "#/components/schemas/CycleState" }

    WeeklyReview:
      type: object
      properties:
        id: { type: string, format: uuid }
        date: { type: string, format: date }
        cycle_id: { type: string, format: uuid, nullable: true }
        answers: { type: object }
        next_step: { type: string }
        friday_show: { type: string }
        created_at: { type: string, format: date-time }

    WeeklyReviewCreate:
      type: object
      required: [next_step, friday_show]
      properties:
        date: { type: string, format: date }
        cycle_id: { type: string, format: uuid }
        answers: { type: object }
        next_step: { type: string }
        friday_show: { type: string }

    QuarterlyReview:
      type: object
      properties:
        id: { type: string, format: uuid }
        date: { type: string, format: date }
        answers: { type: object }
        created_at: { type: string, format: date-time }

    QuarterlyReviewCreate:
      type: object
      properties:
        date: { type: string, format: date }
        answers: { type: object }

    ParkedQuestionNote:
      type: object
      properties:
        date: { type: string, format: date }
        note: { type: string }

    ParkedQuestion:
      type: object
      properties:
        id: { type: string, format: uuid }
        question: { type: string }
        created_at: { type: string, format: date }
        status: { $ref: "#/components/schemas/QuestionStatus" }
        notes:
          type: array
          items:
            $ref: "#/components/schemas/ParkedQuestionNote"

    Status:
      type: object
      properties:
        active_cycle:
          allOf:
            - $ref: "#/components/schemas/Cycle"
          nullable: true
        days_since_last_review: { type: integer, nullable: true }
        last_review_date: { type: string, format: date, nullable: true }
        weekly_review_due: { type: boolean }
        quarterly_review_due: { type: boolean }
        review_streak: { type: integer }
        this_week_next_step: { type: string, nullable: true }
        this_week_friday_show: { type: string, nullable: true }
