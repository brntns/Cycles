<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f6f4ef">
<title>Cycle Companion</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icons/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Cycles">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app" class="app">
  <div id="toast" class="toast" hidden></div>

  <!-- LOGIN -->
  <section id="screen-login" class="screen" hidden>
    <div class="center-column">
      <h1 class="wordmark">Cycle Companion</h1>
      <form id="login-form" class="stack">
        <label class="field">
          <span class="field-label">Password</span>
          <input type="password" id="login-password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="btn btn-primary btn-block">Log in</button>
        <p id="login-error" class="error-text" hidden></p>
      </form>
    </div>
  </section>

  <!-- STATUS -->
  <section id="screen-status" class="screen" hidden>
    <header class="topbar">
      <span class="topbar-title">Cycle Companion</span>
      <button id="logout-btn" class="icon-btn" title="Log out" aria-label="Log out">&#x2039;</button>
    </header>

    <div id="status-content" class="center-column"></div>

    <nav class="tabbar" aria-label="Navigation">
      <button class="tab-btn is-active" data-screen="status">Status</button>
      <button class="tab-btn" data-screen="history">History</button>
    </nav>
  </section>

  <!-- REVIEW FLOW -->
  <section id="screen-review" class="screen" hidden>
    <header class="topbar">
      <button id="review-back" class="icon-btn" aria-label="Back">&#x2039;</button>
      <span class="topbar-title" id="review-step-label"></span>
      <button id="review-cancel" class="icon-btn" aria-label="Cancel">&#x2715;</button>
    </header>
    <div id="review-content" class="center-column"></div>
  </section>

  <!-- HISTORY -->
  <section id="screen-history" class="screen" hidden>
    <header class="topbar">
      <span class="topbar-title">History</span>
    </header>
    <div id="history-content" class="center-column"></div>
    <nav class="tabbar" aria-label="Navigation">
      <button class="tab-btn" data-screen="status">Status</button>
      <button class="tab-btn is-active" data-screen="history">History</button>
    </nav>
  </section>
</div>

<script src="/app.js"></script>
</body>
</html>
