<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f7f5f0" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#171614" media="(prefers-color-scheme: dark)">
<title>Cycles</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icons/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Cycles">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app">
  <div id="toast" class="toast" hidden></div>

  <!-- LOGIN -->
  <section id="screen-login" class="screen" hidden>
    <main class="login-wrap">
      <div class="login-box">
        <img class="login-icon" src="/icons/icon-192.png" alt="" width="64" height="64">
        <h1 class="wordmark">Cycles</h1>
        <p class="tagline">What is my current cycle, and what's the next step?</p>
        <form id="login-form" class="stack">
          <label class="field">
            <span class="field-label">Password</span>
            <input type="password" id="login-password" autocomplete="current-password" required>
          </label>
          <button type="submit" class="btn btn-primary btn-block">Log in</button>
          <p id="login-error" class="error-text" hidden></p>
        </form>
      </div>
    </main>
  </section>

  <!-- SHELL: status + history share header/nav -->
  <section id="screen-shell" class="screen" hidden>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="#/">Cycles</a>
        <nav class="topnav" aria-label="Navigation">
          <a href="#/" data-nav="/">Status</a>
          <a href="#/ideas" data-nav="/ideas">Ideas</a>
          <a href="#/history" data-nav="/history">History</a>
        </nav>
        <button id="logout-btn" class="link-btn">Log out</button>
      </div>
    </header>

    <main id="shell-content" class="content"></main>

    <button id="fab" class="fab" aria-label="Capture an idea">
      <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
    </button>

    <nav class="tabbar" aria-label="Navigation">
      <a href="#/" data-nav="/">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="2.5" fill="currentColor"/></svg>
        <span>Status</span>
      </a>
      <a href="#/ideas" data-nav="/ideas">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-3.6 10.8c.7.55 1.1 1.35 1.1 2.2h5a2.9 2.9 0 0 1 1.1-2.2A6 6 0 0 0 12 3z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Ideas</span>
      </a>
      <a href="#/history" data-nav="/history">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M12 8v4l3 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        <span>History</span>
      </a>
    </nav>
  </section>

  <!-- REVIEW FLOW (weekly + quarterly) -->
  <section id="screen-review" class="screen" hidden>
    <header class="topbar">
      <div class="topbar-inner">
        <button id="review-back" class="icon-btn" aria-label="Back">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span class="topbar-title" id="review-step-label"></span>
        <button id="review-cancel" class="icon-btn" aria-label="Cancel review">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>
    <main id="review-content" class="content content-review"></main>
  </section>
</div>

<script src="/app.js"></script>
</body>
</html>
